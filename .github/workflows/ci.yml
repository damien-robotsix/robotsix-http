name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@43309967ea8011400212a8995d33ca900ee2afed
    with:
      python-version: "3.12"
      uv-version: "0.8.15"
      cov-package: "robotsix_http"
      coverage-threshold: "80"
      install-extras: ""
      run-deptry: true
      run-audit: false
      run-bandit: false
      bandit-severity: "medium"
      mypy-advisory: false
      pytest-args: ""
      pytest-numprocesses: "auto"
      runs-on: "ubuntu-latest"
    secrets: inherit

  uv-audit:
    name: UV Audit (SARIF)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.22"

      - name: Install dependencies
        run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: system
          UV_MALWARE_CHECK: "1"

      - name: Run uv audit
        run: uv audit --frozen --output-format sarif --preview --output uv-audit-results.sarif
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: Upload SARIF results
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07  # v3
        with:
          sarif_file: uv-audit-results.sarif
          category: uv-audit
